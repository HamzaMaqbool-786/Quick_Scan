name: quickscan
description: Smart QR & Barcode Scanner App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6

  # Scanner
  mobile_scanner: ^7.2.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_slidable: ^4.0.3
  google_fonts: ^8.0.2
  fluttertoast: ^9.0.0

  # Platform
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  url_launcher: ^6.3.2

  # Utilities
  intl: ^0.20.2
  vibration: ^3.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
